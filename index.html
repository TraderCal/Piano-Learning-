<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extension Chord Academy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --border: #2a3045;
    --gold: #e8c87a;
    --gold-dim: #a8863a;
    --teal: #4ecdc4;
    --rose: #f07b8a;
    --lavender: #9b8fe8;
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --white-key: #f0ede6;
    --black-key: #1a1c24;
  }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
background: var(--bg);
color: var(--text);
font-family: 'Outfit', sans-serif;
min-height: 100vh;
overflow-x: hidden;
}
/* Subtle grain */
body::before {
content: '';
position: fixed;
inset: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
pointer-events: none;
z-index: 0;
opacity: 0.4;
}
.app {
position: relative;
z-index: 1;
max-width: 900px;
margin: 0 auto;
padding: 24px 16px 60px;
}
/* Header */
header {
text-align: center;
margin-bottom: 36px;
padding-top: 12px;
}
.eyebrow {
font-family: 'DM Mono', monospace;
font-size: 11px;
letter-spacing: 0.2em;
color: var(--gold);
text-transform: uppercase;
margin-bottom: 10px;
}
h1 {
font-family: 'DM Serif Display', serif;
font-size: clamp(28px, 6vw, 48px);
line-height: 1.1;
color: var(--text);
}
h1 em {
font-style: italic;
color: var(--gold);
}
.subtitle {
margin-top: 10px;
color: var(--text-dim);
font-size: 14px;
font-weight: 300;
}
/* Root selector */
.root-bar {
display: flex;
gap: 6px;
flex-wrap: wrap;
justify-content: center;
margin-bottom: 28px;
}
.root-btn {
background: var(--surface);
border: 1px solid var(--border);
color: var(--text-dim);
font-family: 'DM Mono', monospace;
font-size: 13px;
padding: 7px 14px;
border-radius: 6px;
cursor: pointer;
transition: all 0.18s;
}
.root-btn:hover { border-color: var(--gold-dim); color: var(--text); }
.root-btn.active {
background: var(--gold);
border-color: var(--gold);
color: #0d0f14;
font-weight: 600;
}
/* Chord type tabs */
.category-tabs {
display: flex;
gap: 4px;
margin-bottom: 20px;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 10px;
padding: 4px;
}
.cat-tab {
flex: 1;
padding: 9px 8px;
border-radius: 7px;
border: none;
background: transparent;
color: var(--text-dim);
font-family: 'Outfit', sans-serif;
font-size: 13px;
font-weight: 500;
cursor: pointer;
transition: all 0.18s;
white-space: nowrap;
}
.cat-tab:hover { color: var(--text); }
.cat-tab.active {
background: var(--surface2);
color: var(--text);
box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
/* Chord grid */
.chord-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
gap: 12px;
margin-bottom: 32px;
}
.chord-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 12px;
padding: 16px;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
}
.chord-card::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, var(--accent, var(--gold)), transparent);
opacity: 0;
transition: opacity 0.2s;
}
.chord-card:hover { border-color: var(--border); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.chord-card:hover::before { opacity: 1; }
.chord-card.selected {
border-color: var(--accent, var(--gold));
background: var(--surface2);
box-shadow: 0 0 0 1px var(--accent, var(--gold))33;
}
.chord-card.selected::before { opacity: 1; }
.chord-name {
font-family: 'DM Serif Display', serif;
font-size: 20px;
margin-bottom: 4px;
color: var(--text);
}
.chord-symbol {
font-family: 'DM Mono', monospace;
font-size: 11px;
color: var(--accent, var(--gold));
letter-spacing: 0.05em;
margin-bottom: 8px;
}
.chord-tagline {
font-size: 12px;
color: var(--text-dim);
line-height: 1.4;
}
/* Detail panel */
.detail-panel {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 28px;
animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}
.detail-header {
display: flex;
align-items: flex-start;
justify-content: space-between;
margin-bottom: 24px;
flex-wrap: wrap;
gap: 12px;
}
.detail-title {
font-family: 'DM Serif Display', serif;
font-size: 32px;
color: var(--text);
}
.detail-symbol {
font-family: 'DM Mono', monospace;
font-size: 13px;
color: var(--accent, var(--gold));
margin-top: 4px;
}
.formula-badge {
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 8px;
padding: 10px 16px;
font-family: 'DM Mono', monospace;
font-size: 13px;
color: var(--text-dim);
text-align: center;
}
.formula-badge span {
display: block;
font-size: 10px;
color: var(--text-dim);
margin-bottom: 4px;
text-transform: uppercase;
letter-spacing: 0.12em;
}
.formula-badge strong {
color: var(--accent, var(--gold));
font-size: 15px;
}
/* Piano */
.piano-wrap {
margin: 24px 0;
}
.piano-label {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(--text-dim);
text-transform: uppercase;
letter-spacing: 0.15em;
margin-bottom: 12px;
}
.piano {
display: inline-flex;
position: relative;
background: #111318;
border-radius: 8px;
padding: 10px 10px 0 10px;
border: 1px solid #2a2d38;
box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
overflow: visible;
}
.white-key {
width: 36px;
height: 110px;
background: var(--white-key);
border-radius: 0 0 5px 5px;
border: 1px solid #ccc;
border-top: none;
position: relative;
cursor: default;
flex-shrink: 0;
transition: background 0.15s;
display: flex;
align-items: flex-end;
justify-content: center;
padding-bottom: 8px;
}
.white-key.lit {
background: var(--accent, var(--gold));
border-color: var(--accent, var(--gold));
}
.white-key.root-lit {
background: var(--accent, var(--gold));
border-color: var(--accent, var(--gold));
box-shadow: 0 0 10px var(--accent, var(--gold))66;
}
.key-note {
font-family: 'DM Mono', monospace;
font-size: 9px;
color: rgba(0,0,0,0.5);
font-weight: 600;
pointer-events: none;
}
.white-key.lit .key-note,
.white-key.root-lit .key-note { color: rgba(0,0,0,0.7); }
.black-key {
width: 24px;
height: 68px;
background: var(--black-key);
border-radius: 0 0 4px 4px;
position: absolute;
top: 10px;
z-index: 2;
cursor: default;
transition: background 0.15s;
display: flex;
align-items: flex-end;
justify-content: center;
padding-bottom: 5px;
border: 1px solid #333;
border-top: none;
}
.black-key.lit {
background: var(--accent, var(--gold));
box-shadow: 0 0 8px var(--accent, var(--gold))55;
}
.black-key .key-note { color: rgba(255,255,255,0.6); font-size: 8px; }
.black-key.lit .key-note { color: rgba(0,0,0,0.7); }
/* Notes breakdown */
.notes-row {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin: 20px 0;
}
.note-pill {
display: flex;
align-items: center;
gap: 6px;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 20px;
padding: 6px 14px 6px 8px;
font-size: 13px;
animation: popIn 0.2s ease both;
}
@keyframes popIn {
from { opacity: 0; transform: scale(0.85); }
to { opacity: 1; transform: scale(1); }
}
.note-dot {
width: 8px; height: 8px;
border-radius: 50%;
background: var(--accent, var(--gold));
flex-shrink: 0;
}
.note-dot.root-dot {
background: var(--accent, var(--gold));
box-shadow: 0 0 6px var(--accent, var(--gold));
}
.note-name {
font-family: 'DM Mono', monospace;
font-weight: 500;
color: var(--text);
}
.note-role {
font-size: 11px;
color: var(--text-dim);
}
/* Sections */
.section-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 14px;
margin-top: 20px;
}
@media (max-width: 560px) {
.section-grid { grid-template-columns: 1fr; }
.cat-tab { font-size: 12px; padding: 8px 4px; }
}
.info-box {
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 10px;
padding: 14px 16px;
}
.info-box h4 {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(--text-dim);
text-transform: uppercase;
letter-spacing: 0.15em;
margin-bottom: 8px;
}
.info-box p {
font-size: 13px;
line-height: 1.6;
color: var(--text);
font-weight: 300;
}
.tip-box {
grid-column: 1 / -1;
background: linear-gradient(135deg, rgba(78,205,196,0.08), rgba(155,143,232,0.08));
border: 1px solid rgba(78,205,196,0.2);
border-radius: 10px;
padding: 14px 16px;
display: flex;
gap: 10px;
align-items: flex-start;
}
.tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.tip-box p {
font-size: 13px;
line-height: 1.6;
color: var(--text);
font-weight: 300;
}
/* Memory trick */
.memory-trick {
margin-top: 14px;
background: rgba(232,200,122,0.06);
border: 1px solid rgba(232,200,122,0.18);
border-radius: 10px;
padding: 14px 16px;
grid-column: 1 / -1;
}
.memory-trick h4 {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(--gold);
text-transform: uppercase;
letter-spacing: 0.15em;
margin-bottom: 6px;
}
.memory-trick p {
font-size: 13px;
line-height: 1.6;
color: var(--text);
font-weight: 300;
}
/* Empty state */
.empty-state {
text-align: center;
padding: 48px 24px;
color: var(--text-dim);
}
.empty-state .big { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; font-weight: 300; }
/* Interval legend */
.interval-pill {
display: inline-block;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 4px;
padding: 2px 8px;
font-family: 'DM Mono', monospace;
font-size: 11px;
color: var(--accent, var(--gold));
}
</style>
</head>

  // ALTERED
  {
    id:'alt7', cat:'altered', name:'Altered Dominant', symbol:'C7alt',
    intervals:['R','3','вҷӯ7','вҷӯ9','вҷҜ9','вҷҜ5'],
    sound:'Dissonant, tense, jazz вҖ” maximum tension before resolving',
    vibe:'Jazz, bebop, advanced gospel',
    tip:'Stack altered extensions: вҷӯ9, вҷҜ9, вҷӯ5/вҷҜ5 on a dom7 framework. Usually resolves down a 5th.',

    omit:'Voice carefully: 3, вҷӯ7, + any 1-2 altered tones is enough.'

    sound:'Shimmering, floaty, magical вҖ” the Lydian "wonder" sound',

];
// в”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let selectedRoot = 0;
let selectedCat = 'ninth';
let selectedChord = null;
// в”Җв”Җ PIANO LAYOUT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// 2 octaves: C to B (keys C D E F G A B C D E F G A B)
const WHITE_NOTES = ['C','D','E','F','G','A','B','C','D','E','F','G','A','B'];
const BLACK_POSITIONS = [1,3,null,6,8,10,null,13,15,null,18,20,22,null]; // semitone positions
// Build piano
function buildPiano(litSemitones) {
  // We'll render 2 octaves, keys 0-27 semitones (0=C, 27=B+1oct)
  // White keys: C D E F G A B | C D E F G A B
  const whiteNotes = ['C','D','E','F','G','A','B','C','D','E','F','G','A','B'];
  // Black keys between whites (relative): after C,D / after F,G,A / (repeat)
  // Position (px offset from start of each white key):
  const blackAfterWhite = [0,1,3,5,6,8,10, 0+7, 1+7, 3+7, 5+7, 6+7, 8+7, 10+7];
  // whiteKey semitones
  const whiteSemi = [0,2,4,5,7,9,11, 12,14,16,17,19,21,23];
  const blackSemi =  [1,3,6,8,10, 13,15,18,20,22]; // all sharps in 2 octaves
  const blackAfterIdx = [0,1,3,5,6, 7,8,10,12,13]; // which white key index they go after
  const wKeyW = 36, wKeyH = 110, bKeyW = 24, bKeyH = 68;
  const totalW = whiteNotes.length * wKeyW + 20;
  let svgW = totalW, svgH = wKeyH + 20;
  // Build HTML
  let pianoHtml = `<div class="piano" style="width:${totalW}px;height:${wKeyH+20}px;position:relative;">`;
  // White keys
  whiteNotes.forEach((note, i) => {
    const semi = whiteSemi[i];
    const lit = litSemitones.includes(semi % 12);
    const isRoot = (semi % 12) === 0; // root semitone = 0 relative
    pianoHtml += `<div class="white-key${lit ? (isRoot ? ' root-lit' : ' lit') : ''}" style="position:absolute;left:${10+i*wKeyW}px;top:10px;">
      <span class="key-note">${note}</span>
    </div>`;
  });
  // Black keys
  blackAfterIdx.forEach((whiteIdx, i) => {
    const semi = blackSemi[i];
    const lit = litSemitones.includes(semi % 12);
    const isRoot = (semi % 12) === 0;
    const leftPos = 10 + whiteIdx * wKeyW + wKeyW - bKeyW/2;
    const chromNote = CHROMATIC[semi % 12];
    const enharmonic = ENHARMONIC[chromNote];
    const label = enharmonic ? chromNote + '/' + enharmonic : chromNote;
    pianoHtml += `<div class="black-key${lit ? (isRoot ? ' root-lit' : ' lit') : ''}" style="left:${leftPos}px;top:10px;">
      <span class="key-note">${chromNote.replace('#','вҷҜ')}</span>
    </div>`;
  });
  pianoHtml += `</div>`;
  return pianoHtml;
}
// в”Җв”Җ NOTE DISPLAY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function getNoteAtSemitone(rootIdx, semitoneOffset) {
  const idx = (rootIdx + semitoneOffset) % 12;
  const note = CHROMATIC[idx];
  // Choose sharps or flats based on root
  const flatRoots = [1,3,6,8,10];
  if (flatRoots.includes(rootIdx) && ENHARMONIC[note]) {
    return ENHARMONIC[note];
  }
  return note;
}
function renderDetail(chord) {
  if (!chord) {
    return `<div class="empty-state">
      <div class="big">рҹҺ№</div>
      <p>Select a chord above to see it on the piano and learn how it's built.</p>
    </div>`;
  }
  const cat = CATEGORIES.find(c => c.id === chord.cat);
  const accent = cat ? cat.accent : '#e8c87a';
  // Build semitone set (relative, 0-11)
  const relativeSemitones = chord.intervals.map(iv => INTERVAL_MAP[iv] % 12);
  // Get actual notes
  const noteNames = chord.intervals.map(iv => {
    const semi = INTERVAL_MAP[iv];
    return getNoteAtSemitone(selectedRoot, semi);
  });
  // Build symbol with root
  const rootDisplay = ROOTS[selectedRoot].replace('/', '/');
  const chordSymbol = chord.symbol.replace(/^C/, rootDisplay.split('/')[0]);
  // Lit semitones for piano (shifted by root)
  // Piano shows 2 octaves starting at C. We need to show correct positions.
  // Map: for each chord interval, find which piano semitone it is
  // Piano semitone 0 = first C on keyboard. Root might not be C.
  // We light: (rootSemitone + intervalSemitone) % 12 for each interval
  const pianoSemitones = chord.intervals.map(iv => {
    return (ROOT_SEMITONES[selectedRoot] + INTERVAL_MAP[iv]) % 12;
  });
  return `
    <div class="detail-panel" style="--accent:${accent}">
      <div class="detail-header">
        <div>
          <div class="detail-title">${rootDisplay} ${chord.name}</div>
          <div class="detail-symbol">${chordSymbol} &nbsp;В·&nbsp; ${chord.intervals.join(' - ')}</div>
        </div>
        <div class="formula-badge">
          <span>Intervals</span>
          <strong>${chord.intervals.join('  ')}</strong>
        </div>
      </div>
      <!-- Notes row -->
      <div class="notes-row">
        ${chord.intervals.map((iv, i) => `
          <div class="note-pill" style="animation-delay:${i*0.05}s">
            <div class="note-dot${iv==='R'?' root-dot':''}"></div>
            <span class="note-name">${noteNames[i].replace('#','вҷҜ')}</span>
            <span class="note-role">${INTERVAL_NAMES[iv]}</span>
          </div>
        `).join('')}
      </div>
      <!-- Piano -->
      <div class="piano-wrap">
        <div class="piano-label">Keys to press (highlighted)</div>
        ${buildPiano(pianoSemitones)}
      </div>
      <!-- Info grid -->
      <div class="section-grid">
        <div class="info-box">
          <h4>рҹҺ§ How it sounds</h4>
          <p>${chord.sound}</p>
        </div>
        <div class="info-box">
          <h4>рҹҺө Musical context</h4>
          <p>${chord.vibe}</p>
        </div>
        <div class="tip-box">
          <span class="tip-icon">рҹ’Ў</span>
          <p><strong>Theory tip:</strong> ${chord.tip}</p>
        </div>
        ${chord.omit ? `<div class="info-box">
          <h4>вңӮпёҸ Voicing tip</h4>
          <p>${chord.omit}</p>
        </div>` : ''}
        <div class="memory-trick">
          <h4>рҹ§  Memory trick</h4>
          <p>${chord.memory}</p>
        </div>
      </div>
    </div>
  `;
}
// в”Җв”Җ RENDER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function render() {
  // Root bar
  const rootBar = document.getElementById('rootBar');
  rootBar.innerHTML = ROOTS.map((r, i) =>
    `<button class="root-btn${selectedRoot===i?' active':''}" onclick="selectRoot(${i})">${r}</button>`
  ).join('');
  // Category tabs
  const catTabs = document.getElementById('catTabs');
  catTabs.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-tab${selectedCat===c.id?' active':''}" onclick="selectCat('${c.id}')" style="${selectedCat===c.id?`color:${c.accent}`:''}">
      ${c.label}
    </button>`
  ).join('');
  // Chord grid
  const filtered = CHORDS.filter(ch => ch.cat === selectedCat);
  const cat = CATEGORIES.find(c => c.id === selectedCat);
  const accent = cat ? cat.accent : '#e8c87a';
  const chordGrid = document.getElementById('chordGrid');
  chordGrid.innerHTML = filtered.map(ch =>
    `<div class="chord-card${selectedChord && selectedChord.id===ch.id?' selected':''}"
         style="--accent:${accent}"
         onclick="selectChord('${ch.id}')">
      <div class="chord-name">${ch.name}</div>
      <div class="chord-symbol">${ch.symbol.replace(/^C/, ROOTS[selectedRoot].split('/')[0])}</div>
      <div class="chord-tagline">${ch.intervals.join(' вҖ“ ')}</div>
    </div>`
  ).join('');
  // Detail
  document.getElementById('detailPanel').innerHTML = renderDetail(selectedChord);
}
function selectRoot(i) { selectedRoot = i; render(); }
function selectCat(id) {
  selectedCat = id;
  selectedChord = null;
  render();
}
function selectChord(id) {
  selectedChord = CHORDS.find(c => c.id === id) || null;
  render();
  setTimeout(() => {
    const panel = document.getElementById('detailPanel');
    if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}
// Init
render();
</script>
